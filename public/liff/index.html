<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>員工打卡系統</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary:       #0891B2;
      --primary-light: #22D3EE;
      --primary-dark:  #0E7490;
      --bg:            #F0FDFF;
      --bg2:           #E0F7FA;
      --surface:       #FFFFFF;
      --surface2:      #F8FFFE;
      --text:          #0F172A;
      --text-sub:      #0E7490;
      --text-muted:    #64748B;
      --border:        #BAE6F5;
      --border-light:  #E0F5FB;
      --success:       #22C55E;
      --danger:        #EF4444;
      --warning:       #F59E0B;
      --shadow-sm:     0 2px 8px rgba(8,145,178,0.08);
      --shadow:        0 4px 20px rgba(8,145,178,0.12);
      --shadow-lg:     0 8px 32px rgba(8,145,178,0.2);
      --radius:        20px;
      --radius-sm:     14px;
      --radius-xs:     8px;
    }

    body {
      font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 90px;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── HERO ─── */
    .hero {
      background: linear-gradient(145deg, #075985 0%, #0891B2 50%, #0EA5E9 100%);
      padding: 24px 20px 28px;
      position: relative;
      overflow: hidden;
    }

    /* Decorative blobs */
    .hero::before {
      content: '';
      position: absolute;
      top: -50px; right: -50px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      pointer-events: none;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -70px; left: -40px;
      width: 240px; height: 240px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      pointer-events: none;
    }

    .hero-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 22px;
      position: relative;
      z-index: 1;
    }

    .hero-greeting {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      font-weight: 400;
      margin-bottom: 5px;
      letter-spacing: 0.02em;
    }

    /* Hero user row */
    .hero-user {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hero-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.45);
      object-fit: cover;
      flex-shrink: 0;
      background: rgba(255,255,255,0.2);
      display: none;
    }

    #userName {
      font-size: 22px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: -0.01em;
    }

    .hero-clock {
      text-align: right;
    }

    .hero-time {
      font-family: 'Outfit', sans-serif;
      font-size: 34px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .hero-date {
      font-size: 12px;
      color: rgba(255,255,255,0.65);
      font-weight: 400;
      margin-top: 4px;
      text-align: right;
    }

    /* Stats row */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .stat-card {
      background: rgba(255,255,255,0.13);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: var(--radius-sm);
      padding: 14px 10px;
      text-align: center;
    }

    .stat-value {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #FFFFFF;
      line-height: 1;
      margin-bottom: 5px;
    }

    .stat-label {
      font-size: 11px;
      color: rgba(255,255,255,0.72);
      font-weight: 500;
    }

    /* ─── BOTTOM TAB NAV ─── */
    .tab-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border-light);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      padding: 4px 6px;
      padding-bottom: calc(4px + env(safe-area-inset-bottom));
      z-index: 50;
      box-shadow: 0 -6px 28px rgba(8,145,178,0.1);
    }

    .tab-btn {
      background: none;
      border: none;
      color: #94A3B8;
      padding: 7px 4px;
      cursor: pointer;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      font-weight: 500;
      min-height: 52px;
      justify-content: center;
      font-family: 'Noto Sans TC', sans-serif;
      transition: color 0.2s ease;
      position: relative;
    }

    .tab-btn i {
      font-size: 19px;
      transition: color 0.2s;
    }

    .tab-btn.active {
      color: var(--primary);
    }

    /* Active top indicator */
    .tab-btn.active::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 32px;
      height: 3px;
      background: var(--primary);
      border-radius: 0 0 6px 6px;
    }

    /* ─── TAB CONTENT ─── */
    .tab-content {
      display: none;
      padding: 18px 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    .tab-content.active {
      display: block;
      animation: fadeUp 0.22s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── CARD ─── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-sm);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title i {
      color: var(--primary);
      font-size: 15px;
    }

    .card-link {
      font-size: 12px;
      color: var(--primary);
      font-weight: 500;
      cursor: pointer;
    }

    /* ─── LOCATION STATUS ─── */
    .location-status {
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      transition: all 0.3s ease;
      line-height: 1.5;
    }

    .location-status i {
      font-size: 18px;
      flex-shrink: 0;
    }

    .location-status.loading {
      background: #F8FAFC;
      color: var(--text-muted);
      border: 1px solid var(--border-light);
    }

    .location-status.success {
      background: #F0FDF4;
      color: #15803D;
      border: 1px solid #BBF7D0;
    }

    .location-status.error {
      background: #FFF1F2;
      color: #BE123C;
      border: 1px solid #FECDD3;
    }

    /* ─── CHECKIN BUTTONS ─── */
    .checkin-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 6px;
    }

    .checkin-btn {
      border: none;
      border-radius: var(--radius);
      padding: 24px 12px 20px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      transition: all 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
      min-height: 126px;
      justify-content: center;
      font-family: 'Noto Sans TC', sans-serif;
      position: relative;
      overflow: hidden;
    }

    .checkin-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.2s ease;
    }

    .checkin-btn:hover:not(:disabled)::after {
      background: rgba(255,255,255,0.1);
    }

    .checkin-btn:active:not(:disabled) {
      transform: scale(0.96) !important;
    }

    /* Icon circle */
    .btn-icon {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      transition: transform 0.2s ease;
    }

    .checkin-btn:hover:not(:disabled) .btn-icon {
      transform: scale(1.08);
    }

    .btn-label {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .btn-sub {
      font-size: 11px;
      opacity: 0.75;
      font-weight: 400;
      margin-top: -6px;
    }

    /* Check-in = cyan */
    .checkin-btn.btn-in {
      background: linear-gradient(145deg, #0891B2 0%, #22D3EE 100%);
      color: white;
      box-shadow: 0 6px 22px rgba(8,145,178,0.35);
    }

    .checkin-btn.btn-in:hover:not(:disabled) {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(8,145,178,0.45);
    }

    /* Check-out = dark slate */
    .checkin-btn.btn-out {
      background: linear-gradient(145deg, #334155 0%, #64748B 100%);
      color: white;
      box-shadow: 0 6px 22px rgba(51,65,85,0.28);
    }

    .checkin-btn.btn-out:hover:not(:disabled) {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(51,65,85,0.38);
    }

    /* Disabled state */
    .checkin-btn:disabled {
      background: #E2E8F0;
      color: #94A3B8;
      box-shadow: none;
      cursor: not-allowed;
      transform: none !important;
    }

    .checkin-btn:disabled .btn-icon {
      background: rgba(148,163,184,0.2);
    }

    /* ─── RECORD ITEMS ─── */
    .record-item {
      background: var(--bg);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .record-item:hover {
      background: var(--surface);
      border-color: var(--border);
      box-shadow: var(--shadow-sm);
      transform: translateX(2px);
    }

    .record-item:last-child { margin-bottom: 0; }

    .record-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .record-icon.in  { background: linear-gradient(135deg,#CFFAFE,#A5F3FC); color: var(--primary-dark); }
    .record-icon.out { background: #F1F5F9; color: #64748B; }

    .record-details { flex: 1; min-width: 0; }

    .record-type {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }

    .record-time { font-size: 12px; color: var(--text-muted); }

    .record-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .record-badge.in  { background: #CFFAFE; color: var(--primary-dark); }
    .record-badge.out { background: #F1F5F9; color: #64748B; }

    /* ─── TABLE ROW ─── */
    .record-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-light);
    }

    .record-row:last-child { border-bottom: none; }
    .record-row-label { font-size: 14px; color: var(--text-muted); }
    .record-row-value { font-size: 14px; font-weight: 600; color: var(--text); }

    /* ─── CALENDAR ─── */
    .calendar-nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .calendar-month { font-size: 17px; font-weight: 700; color: var(--text); }

    .calendar-nav { display: flex; gap: 6px; }

    .calendar-nav button {
      width: 34px; height: 34px;
      border-radius: 8px;
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--primary);
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
    }

    .calendar-nav button:hover { background: var(--primary); color: white; border-color: var(--primary); }

    .calendar-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 6px;
    }

    .calendar-weekday {
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      padding: 6px 0;
    }

    .calendar-weekday:first-child { color: #EF4444; }
    .calendar-weekday:last-child  { color: var(--primary); }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .calendar-day {
      aspect-ratio: 1;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      transition: all 0.18s ease;
      position: relative;
    }

    .calendar-day:hover:not(.empty):not(.other-month) { background: var(--bg2); }
    .calendar-day.other-month  { color: #CBD5E1; cursor: default; }
    .calendar-day.today        { background: var(--bg2); color: var(--primary); font-weight: 700; border: 1.5px solid var(--primary); }
    .calendar-day.has-checkin::after {
      content: '';
      position: absolute;
      bottom: 4px;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--primary);
    }
    .calendar-day.selected              { background: var(--primary); color: white; font-weight: 700; }
    .calendar-day.selected::after       { background: white; }

    /* ─── HOURS GRID ─── */
    .hours-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .hours-box {
      background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 20px 14px;
      text-align: center;
    }

    .hours-value {
      font-family: 'Outfit', sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 6px;
    }

    .hours-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      text-align: center;
      padding: 36px 20px;
      color: var(--text-muted);
    }

    .empty-state i {
      font-size: 40px;
      color: var(--border);
      margin-bottom: 12px;
      display: block;
    }

    .empty-state-text { font-size: 14px; color: var(--text-muted); }

    /* ─── SECTION LABEL ─── */
    .section-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
      padding: 0 2px;
    }

    /* ─── TOAST ─── */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-120px);
      background: #0F172A;
      color: #fff;
      padding: 12px 24px;
      border-radius: 30px;
      box-shadow: 0 8px 28px rgba(15,23,42,0.25);
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 100;
      font-weight: 500;
      font-size: 14px;
      max-width: 88%;
      white-space: nowrap;
      pointer-events: none;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: #059669; }
    .toast.error   { background: #DC2626; }

    /* ─── DIVIDER ─── */
    .divider { height: 1px; background: var(--border-light); margin: 8px 0; }

    /* ─── LEAVE SYSTEM ─── */
    .leave-form-group { margin-bottom: 16px; }

    .leave-form-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .leave-select,
    .leave-input,
    .leave-textarea {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 14px;
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      outline: none;
      transition: border-color 0.2s ease;
      -webkit-appearance: none;
    }

    .leave-select:focus,
    .leave-input:focus,
    .leave-textarea:focus { border-color: var(--primary); background: var(--surface); }

    .leave-textarea { resize: none; height: 80px; line-height: 1.5; }

    .leave-date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .leave-submit-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Noto Sans TC', sans-serif;
      transition: all 0.2s ease;
      box-shadow: 0 4px 16px rgba(8,145,178,0.3);
      margin-top: 4px;
    }

    .leave-submit-btn:hover      { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(8,145,178,0.4); }
    .leave-submit-btn:disabled   { background: #E2E8F0; color: #94A3B8; box-shadow: none; cursor: not-allowed; }

    .leave-status {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .leave-status.pending  { background: #FEF3C7; color: #D97706; }
    .leave-status.approved { background: #D1FAE5; color: #059669; }
    .leave-status.rejected { background: #FEE2E2; color: #DC2626; }

    .leave-item {
      background: var(--bg);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    .leave-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .leave-item-type {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .leave-item-type i    { color: var(--primary); font-size: 13px; }
    .leave-item-dates     { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .leave-item-reason    { font-size: 12px; color: var(--text-sub); }

    .leave-item-reject {
      font-size: 12px;
      color: #DC2626;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .leave-type-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
      color: var(--primary-dark);
    }

    /* ─── LATE MODAL ─── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.55);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .modal-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .modal-sheet {
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      padding: 28px 22px 36px;
      width: 100%;
      max-width: 600px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .modal-overlay.show .modal-sheet {
      transform: translateY(0);
    }

    .modal-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .modal-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-title i { color: var(--warning); }

    .modal-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 18px;
    }

    .modal-textarea {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 13px 14px;
      font-size: 14px;
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      outline: none;
      resize: none;
      height: 96px;
      line-height: 1.6;
      transition: border-color 0.2s ease;
    }

    .modal-textarea:focus { border-color: var(--primary); }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 10px;
      margin-top: 16px;
    }

    .modal-cancel {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-size: 15px;
      font-weight: 600;
      padding: 14px;
      cursor: pointer;
      font-family: 'Noto Sans TC', sans-serif;
    }

    .modal-confirm {
      background: linear-gradient(135deg, var(--warning) 0%, #FBBF24 100%);
      border: none;
      border-radius: var(--radius-sm);
      color: white;
      font-size: 15px;
      font-weight: 700;
      padding: 14px;
      cursor: pointer;
      font-family: 'Noto Sans TC', sans-serif;
      box-shadow: 0 4px 14px rgba(245,158,11,0.35);
    }

    /* ─── SPINNER ─── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .fa-spin { animation: spin 1s linear infinite; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 375px) {
      .stats-grid  { gap: 7px; }
      .stat-value  { font-size: 18px; }
      .stat-label  { font-size: 10px; }
      .checkin-btn { min-height: 112px; padding: 20px 10px 16px; }
      .tab-content { padding: 14px 12px; }
      .tab-btn     { font-size: 10px; }
      .tab-btn i   { font-size: 17px; }
      .hero-time   { font-size: 28px; }
      #userName    { font-size: 19px; }
    }

    /* ─── REDUCED MOTION ─── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <!-- ── Hero (Greeting + Clock + Stats) ── -->
  <div class="hero">
    <div class="hero-top">
      <div class="hero-user">
        <img id="heroAvatar" class="hero-avatar" src="" alt="頭像" onerror="this.style.display='none'">
        <div>
          <div class="hero-greeting" id="heroGreeting">你好，</div>
          <div id="userName">載入中…</div>
        </div>
      </div>
      <div class="hero-clock">
        <div class="hero-time" id="heroTime">--:--</div>
        <div class="hero-date" id="heroDate"></div>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="todayStatus">--</div>
        <div class="stat-label">今日狀態</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="monthHours">--</div>
        <div class="stat-label">本月工時</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="workDays">--</div>
        <div class="stat-label">出勤天數</div>
      </div>
    </div>
  </div>

  <!-- ── Bottom Tab Nav ── -->
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('checkin', this)" aria-label="打卡">
      <i class="fas fa-fingerprint"></i>
      <span>打卡</span>
    </button>
    <button class="tab-btn" onclick="switchTab('calendar', this)" aria-label="日曆">
      <i class="fas fa-calendar-alt"></i>
      <span>日曆</span>
    </button>
    <button class="tab-btn" onclick="switchTab('records', this)" aria-label="紀錄">
      <i class="fas fa-list-ul"></i>
      <span>紀錄</span>
    </button>
    <button class="tab-btn" onclick="switchTab('leave', this)" aria-label="請假">
      <i class="fas fa-umbrella-beach"></i>
      <span>請假</span>
    </button>
    <button class="tab-btn" onclick="switchTab('stats', this)" aria-label="統計">
      <i class="fas fa-chart-bar"></i>
      <span>統計</span>
    </button>
  </div>

  <!-- ── Tab: 打卡 ── -->
  <div id="checkinTab" class="tab-content active">

    <!-- Location -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <i class="fas fa-location-dot"></i>
          位置驗證
        </div>
        <span class="card-link" onclick="checkLocation()" style="display:flex;align-items:center;gap:4px;">
          <i class="fas fa-rotate-right"></i> 重新定位
        </span>
      </div>
      <div id="locationStatus" class="location-status loading">
        <i class="fas fa-spinner fa-spin"></i>
        正在取得位置…
      </div>
    </div>

    <!-- Punch buttons -->
    <div class="card">
      <div class="card-title" style="margin-bottom:16px;">
        <i class="fas fa-hand-pointer"></i>
        快速打卡
      </div>
      <div class="checkin-grid">
        <button id="checkinBtn" class="checkin-btn btn-in" onclick="handleCheckin()" disabled>
          <div class="btn-icon"><i class="fas fa-sign-in-alt"></i></div>
          <span class="btn-label">上班打卡</span>
          <span class="btn-sub">點擊記錄上班</span>
        </button>
        <button id="checkoutBtn" class="checkin-btn btn-out" onclick="handleCheckout()" disabled>
          <div class="btn-icon"><i class="fas fa-sign-out-alt"></i></div>
          <span class="btn-label">下班打卡</span>
          <span class="btn-sub">點擊記錄下班</span>
        </button>
      </div>
    </div>

    <!-- Today records -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <i class="fas fa-clock-rotate-left"></i>
          今日打卡
        </div>
      </div>
      <div id="todayRecords"></div>
    </div>
  </div>

  <!-- ── Tab: 日曆 ── -->
  <div id="calendarTab" class="tab-content">
    <div class="card">
      <div class="calendar-nav-row">
        <div class="calendar-month" id="calendarMonth"></div>
        <div class="calendar-nav">
          <button onclick="changeMonth(-1)" aria-label="上個月"><i class="fas fa-chevron-left"></i></button>
          <button onclick="changeMonth(1)"  aria-label="下個月"><i class="fas fa-chevron-right"></i></button>
        </div>
      </div>
      <div class="calendar-weekdays">
        <div class="calendar-weekday">日</div>
        <div class="calendar-weekday">一</div>
        <div class="calendar-weekday">二</div>
        <div class="calendar-weekday">三</div>
        <div class="calendar-weekday">四</div>
        <div class="calendar-weekday">五</div>
        <div class="calendar-weekday">六</div>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="card" id="selectedDayRecords" style="display:none;">
      <div class="card-title" style="margin-bottom:14px;">
        <i class="fas fa-calendar-day"></i>
        <span id="selectedDate"></span>
      </div>
      <div id="dayRecordsList"></div>
    </div>
  </div>

  <!-- ── Tab: 紀錄 ── -->
  <div id="recordsTab" class="tab-content">
    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <i class="fas fa-clipboard-list"></i>
          最近 30 天
        </div>
      </div>
      <div id="allRecordsList"></div>
    </div>
  </div>

  <!-- ── Tab: 請假 ── -->
  <div id="leaveTab" class="tab-content">
    <div class="card">
      <div class="card-title" style="margin-bottom:16px;">
        <i class="fas fa-pen-to-square"></i>
        申請請假
      </div>

      <div class="leave-form-group">
        <label class="leave-form-label">假別</label>
        <select id="leaveType" class="leave-select">
          <option value="annual">特休</option>
          <option value="sick">病假</option>
          <option value="personal">事假</option>
          <option value="other">其他</option>
        </select>
      </div>

      <div class="leave-form-group">
        <label class="leave-form-label">請假日期</label>
        <div class="leave-date-row">
          <div>
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">開始日期</div>
            <input type="date" id="leaveStartDate" class="leave-input">
          </div>
          <div>
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">結束日期</div>
            <input type="date" id="leaveEndDate" class="leave-input">
          </div>
        </div>
      </div>

      <div class="leave-form-group">
        <label class="leave-form-label">請假原因（選填）</label>
        <textarea id="leaveReason" class="leave-textarea" placeholder="請簡述請假原因…"></textarea>
      </div>

      <button id="leaveSubmitBtn" class="leave-submit-btn" onclick="submitLeave()">
        <i class="fas fa-paper-plane"></i>
        送出申請
      </button>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <i class="fas fa-clock-rotate-left"></i>
          我的請假紀錄
        </div>
      </div>
      <div id="myLeavesList">
        <div class="empty-state">
          <i class="fas fa-spinner fa-spin"></i>
          <p class="empty-state-text">載入中…</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Tab: 統計 ── -->
  <div id="statsTab" class="tab-content">
    <div class="card">
      <div class="card-title" style="margin-bottom:16px;">
        <i class="fas fa-hourglass-half"></i>
        本月工時統計
      </div>
      <div class="hours-grid">
        <div class="hours-box">
          <div class="hours-value" id="totalHours">0</div>
          <div class="hours-label">總工時</div>
        </div>
        <div class="hours-box">
          <div class="hours-value" id="avgHours">0</div>
          <div class="hours-label">日均工時</div>
        </div>
      </div>
      <div id="dailyStatsList"></div>
    </div>
  </div>

  <!-- ── Late Check-in Modal ── -->
  <div id="lateModal" class="modal-overlay">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div id="modalTitle" class="modal-title">
        <i class="fas fa-clock"></i>
        您有遲到，請說明原因
      </div>
      <div id="modalSub" class="modal-sub">填寫說明後才能完成上班打卡</div>
      <textarea id="lateReason" class="modal-textarea" placeholder="請輸入遲到原因…" maxlength="200"></textarea>
      <div class="modal-actions">
        <button id="lateCancelBtn" class="modal-cancel">取消</button>
        <button id="lateConfirmBtn" class="modal-confirm">
          <i class="fas fa-check"></i> 確認打卡
        </button>
      </div>
    </div>
  </div>

  <!-- ── Toast ── -->
  <div id="toast" class="toast"></div>

  <script>
    /* Live clock + greeting + date in hero */
    function updateHeroClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const timeEl = document.getElementById('heroTime');
      if (timeEl) timeEl.textContent = h + ':' + m;

      const weekDays = ['週日','週一','週二','週三','週四','週五','週六'];
      const dateEl = document.getElementById('heroDate');
      if (dateEl) dateEl.textContent = (now.getMonth()+1) + '/' + now.getDate() + ' ' + weekDays[now.getDay()];

      const hr = now.getHours();
      const greetEl = document.getElementById('heroGreeting');
      if (greetEl) greetEl.textContent = hr < 12 ? '早安，' : hr < 18 ? '午安，' : '晚安，';
    }
    updateHeroClock();
    setInterval(updateHeroClock, 15000);
  </script>

  <script src="app.js?v=5.11"></script>
</body>
</html>
